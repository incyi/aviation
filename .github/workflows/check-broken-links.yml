name: Check Broken links

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 16 * * 5'
    
permissions:
  contents: read
  
jobs:
  check-broken-links:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Wait for the website has been uploaded.
        run: |
          echo "Waiting for the website to be uploaded..."
          sleep 60

      - name: Check broken links with muffet
        run: |
          # Install muffet (Go-based link checker)
          go install github.com/raviqqe/muffet@latest
          
          # Run muffet on the website
          MUFFET_BIN=$(go env GOPATH)/bin/muffet
          $MUFFET_BIN -b 8192 -c 10 -t 30 https://aero.algorismi.nl/ || true
        continue-on-error: true

      - name: Report results
        if: always()
        run: |
          echo "Link check completed"
          echo "Check the output above for any broken links"